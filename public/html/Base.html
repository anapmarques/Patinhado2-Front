{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{% block title %}Site{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="{% static 'PatinhadoWeb/css/base.css' %}">

{% block extra_head %}{% endblock %}
</head>
<body>

<!-- ── HEADER ────────────────────────────────── -->
<header>
  <a href="{% url 'home' %}" class="logo"><img src="{% static 'PatinhadoWeb/logo.png' %}" alt="Logo"></a>

  <nav>
      <a href="{% url 'about' %}"   {% if request.resolver_match.url_name == 'about'   %}class="active"{% endif %}>Sobre Nós</a>
      <a href="{% url 'listapets' %}"    {% if request.resolver_match.url_name == 'list'    %}class="active"{% endif %}>Pets</a>
      <a href="{% url 'contact' %}" {% if request.resolver_match.url_name == 'contact' %}class="active"{% endif %}>Contato</a>
  </nav>

  {% if user.is_authenticated %}
    <a href="{% url 'logout' %}" class="header-user" aria-label="Sair">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </a>
    <a href="{% url 'profile' %}" class="header-user" aria-label="Perfil do usuário">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
    </a>
  {% else %}
    <a href="{% url 'login' %}" class="header-user {% if request.resolver_match.url_name == 'login' %}active{% endif %}" aria-label="Perfil do usuário">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
    </a>
  {% endif %}
</header>

<!-- ── CONTEÚDO DA PÁGINA ─────────────────────── -->
{% block content %}{% endblock %}

<!-- ── FOOTER ─────────────────────────────────── -->
<footer>
  <div class="footer-logo"><img src="{% static 'PatinhadoWeb/logo.png' %}" alt="Logo"></div>
  <div class="footer-links">
    <a href="{% url 'about' %}">Sobre Nós</a>
    <a href="{% url 'list' %}">Pets</a>
    <a href="{% url 'contact' %}">Contato</a>
  </div>
  <div class="footer-copy">© 2026</div>
</footer>

{% block extra_scripts %}{% endblock %}
</body>
</html>

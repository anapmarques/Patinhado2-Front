{% extends "PatinhadoWeb/Base.html" %}
{% load static %}
{% block title %}Entrar{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'PatinhadoWeb/css/login.css' %}">
{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <h1>Entrar</h1>
        <p class="subtitle">Faça login para continuar</p>
        <form method="post">
            {% csrf_token %}
            <table class="formulario">
                {{ form.as_table }}
            </table>
            <input type="submit" value="Entrar" class="btn-submit">
        </form>
        <p class="register-link"><a href="{% url 'password_reset' %}">Esqueceu a senha?</a></p>
        <p class="register-link">Não tem uma conta? <a href="{% url 'register' %}">Cadastre-se</a></p>
    </div>
</div>
{% endblock %}

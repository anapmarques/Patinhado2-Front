<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Solicitar Adoção | Patinhado</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../css/pet/petDetail.css" />
<link rel="stylesheet" href="../css/base.css" />
</head>
<body>

<iframe src="../cabecalho.html" class="header-frame header-frame-sm"></iframe>

<main class="page-wrapper">
  <div class="form-card">
    <h1>Solicitar Adoção</h1>
    <div class="pet-preview" id="pet-preview"></div>
    <form id="adopt-form">
      <div class="field-group">
        <label for="mensagem">Mensagem para o doador</label>
        <textarea id="mensagem" name="mensagem" rows="5" required></textarea>
      </div>
      <div class="btn-row">
        <button type="submit" class="btn-submit">Enviar Pedido</button>
        <a href="list.html" class="btn-cancelar">Cancelar</a>
      </div>
    </form>
  </div>
</main>

<script src="../javascript/constantes.js"></script>
<script src="../javascript/accounts/common.js"></script>
<script src="../javascript/pet/adopt.js"></script>
</body>
</html>

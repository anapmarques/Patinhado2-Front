<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Editar Pet</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../css/pet/petEdit.css" />
<link rel="stylesheet" href="../css/base.css" />
</head>
<body>

<iframe src="../cabecalho.html" class="header-frame header-frame-sm"></iframe>

<main class="page-wrapper">
  <div class="form-card">
    <p class="pet-name-label" id="pet-especie-label"></p>
    <h1>Editar pet</h1>
    <p class="subtitle" id="pet-subtitle"></p>
    <form id="pet-form">
      <div class="field-group">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" required />
      </div>
      <div class="field-group">
        <label for="especie">Espécie</label>
        <select id="especie" name="especie" required>
          <option value="">Selecione...</option>
          <option value="cachorro">Cachorro</option>
          <option value="gato">Gato</option>
        </select>
      </div>
      <div class="field-group">
        <label for="raca">Raça</label>
        <input type="text" id="raca" name="raca" />
      </div>
      <div class="field-group">
        <label for="idade">Idade (anos)</label>
        <input type="number" id="idade" name="idade" min="0" />
      </div>
      <div class="field-group">
        <label for="descricao">Descrição</label>
        <textarea id="descricao" name="descricao" rows="4"></textarea>
      </div>
      <div class="field-group">
        <label for="foto_url">URL da Foto</label>
        <input type="url" id="foto_url" name="foto_url" />
      </div>
      <div class="btn-row">
        <button type="submit" class="btn-submit">Salvar alterações</button>
        <a href="list.html" class="btn-cancelar">Cancelar</a>
      </div>
    </form>
  </div>
</main>

<script src="../javascript/constantes.js"></script>
<script src="../javascript/accounts/common.js"></script>
<script src="../javascript/pet/edit.js"></script>
</body>
</html>

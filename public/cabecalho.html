<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/cabecalho.css">
</head>
<body>
<header>
    <a href="index.html" class="logo" target="_parent">Patinhado</a>
  <nav>
    <a href="index.html" target="_parent">Home</a>
  </nav>
  <div id="unlogged" class="visivel">
    <a href="accounts/login.html" class="header-user" aria-label="Login" target="_parent">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
    </a>
  </div>
  <div id="logged" class="invisivel">
    <span class="header-info">Você é <span id="identificacao">visitante</span></span>
    <a href="accounts/profile.html" class="header-user" aria-label="Perfil" target="_parent">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
    </a>
    <a href="accounts/password_change.html" class="header-user" aria-label="Trocar senha" target="_parent">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </a>
    <a href="#" id="logout" class="header-user" aria-label="Sair">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </a>
  </div>
</header>
<script src="javascript/constantes.js"></script>
<script src="javascript/accounts/common.js"></script>
<script src="javascript/cabecalho.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Excluir Conta</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/register.css">
</head>
<body>
<iframe src="../cabecalho.html" class="header-frame header-frame-lg"></iframe>
<div class="register-wrapper">
    <div class="register-card">
        <h1>Excluir Conta</h1>
        <p class="subtitle">Tem certeza que deseja continuar?</p>
        <div class="warning-message">
            <p><strong>Atenção:</strong> Sua conta será excluída permanentemente.</p>
            <p>Todos os seus pets para adoção e solicitações de adoção também serão excluídos.</p>
            <p>Esta ação não pode ser desfeita.</p>
        </div>
        <form id="delete-profile-form" class="register-form">
            <div class="checkbox-confirm">
                <input type="checkbox" id="confirm-delete" name="confirm-delete">
                <label for="confirm-delete">Eu entendo que minha conta será excluída permanentemente</label>
            </div>
            <div id="delete-error" class="errorlist"></div>
            <input type="submit" value="Excluir Minha Conta" class="btn-delete-submit">
        </form>
        <p class="login-link"><a href="profile.html">Cancelar e retornar ao perfil</a></p>
    </div>
</div>
<footer>
    <div class="footer-logo"><img src="../img/logo.png" alt="Logo"></div>
    <div class="footer-links">
        <a href="../about.html">Sobre Nós</a>
        <a href="../pet/list.html">Pets</a>
        <a href="../contact.html">Contato</a>
    </div>
    <div class="footer-copy">© 2026</div>
</footer>
<script src="../javascript/constantes.js"></script>
<script src="../javascript/accounts/common.js"></script>
<script src="../javascript/accounts/delete_profile.js"></script>
</body>
</html>

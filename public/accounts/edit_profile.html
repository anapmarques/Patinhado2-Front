<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Editar Perfil</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/register.css">
</head>
<body>
<iframe src="../cabecalho.html" class="header-frame header-frame-lg"></iframe>
<div class="register-wrapper">
    <div class="register-card">
        <h1>Editar Perfil</h1>
        <p class="subtitle">Atualize suas informações</p>
        <form id="edit-profile-form" class="register-form">
            <div class="field-row">
                <label for="username">Usuário</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="field-row">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="field-row">
                <label for="first_name">Nome</label>
                <input type="text" id="first_name" name="first_name">
            </div>
            <div class="field-row">
                <label for="last_name">Sobrenome</label>
                <input type="text" id="last_name" name="last_name">
            </div>
            <div class="field-row">
                <label for="telefone">Telefone</label>
                <input type="text" id="telefone" name="telefone">
            </div>
            <div class="field-row">
                <label for="endereco">Endereço</label>
                <input type="text" id="endereco" name="endereco">
            </div>
            <div id="edit-error" class="errorlist"></div>
            <input type="submit" value="Salvar Alterções" class="btn-submit">
        </form>
        <p class="login-link"><a href="profile.html">Cancelar e retornar ao perfil</a></p>
    </div>
</div>
<footer>
    <div class="footer-logo"><img src="../img/logo.png" alt="Logo"></div>
    <div class="footer-links">
        <a href="../about.html">Sobre Nós</a>
        <a href="../pet/list.html">Pets</a>
        <a href="../contact.html">Contato</a>
    </div>
    <div class="footer-copy">© 2026</div>
</footer>
<script src="../javascript/constantes.js"></script>
<script src="../javascript/accounts/common.js"></script>
<script src="../javascript/accounts/edit_profile.js"></script>
</body>
</html>

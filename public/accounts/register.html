<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cadastre-se</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/register.css">
</head>
<body>
<iframe src="../cabecalho.html" class="header-frame header-frame-lg"></iframe>
<div class="register-wrapper">
    <div class="register-card">
        <h1>Cadastre-se</h1>
        <p class="subtitle">Crie sua conta</p>
        <form id="register-form" class="register-form">
            <div class="field-row">
                <label for="username">Usuário</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="field-row">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="field-row">
                <label for="first_name">Nome</label>
                <input type="text" id="first_name" name="first_name">
            </div>
            <div class="field-row">
                <label for="last_name">Sobrenome</label>
                <input type="text" id="last_name" name="last_name">
            </div>
            <div class="field-row">
                <label for="password">Senha</label>
                <div class="password-field">
                    <input type="password" id="password" name="password" required>
                    <div class="password-toggle">
                        <img src="../img/eye-off.svg" class="toggle-password" alt="" width="20" height="20">
                        <span>Mostrar senha</span>
                    </div>
                </div>
            </div>
            <div class="field-row">
                <label for="password2">Confirmar Senha</label>
                <div class="password-field">
                    <input type="password" id="password2" name="password2" required>
                    <div class="password-toggle">
                        <img src="../img/eye-off.svg" class="toggle-password" alt="" width="20" height="20">
                        <span>Mostrar senha</span>
                    </div>
                </div>
            </div>
            <div id="register-error" class="errorlist"></div>
            <input type="submit" value="Criar Conta" class="btn-submit">
        </form>
        <p class="login-link">Já tem uma conta? <a href="login.html">Entre</a></p>
    </div>
</div>
<footer>
    <div class="footer-logo"><img src="../img/logo.png" alt="Logo"></div>
    <div class="footer-links">
        <a href="../about.html">Sobre Nós</a>
        <a href="../pet/list.html">Pets</a>
        <a href="../contact.html">Contato</a>
    </div>
    <div class="footer-copy">© 2026</div>
</footer>
<script src="../javascript/constantes.js"></script>
<script src="../javascript/accounts/common.js"></script>
<script src="../javascript/accounts/register.js"></script>
</body>
</html>

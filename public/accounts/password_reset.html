<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Recuperar Senha</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/login.css">
</head>
<body>
<iframe src="../cabecalho.html" class="header-frame header-frame-lg"></iframe>
<div class="login-wrapper">
    <div class="login-card">
        <h1>Recuperar Senha</h1>
        <p class="subtitle">Digite seu email para receber instruções</p>
        <form id="password-reset-form">
            <table class="formulario">
                <tr>
                    <td><label for="email">Email</label></td>
                    <td><input type="email" id="email" name="email" required></td>
                </tr>
            </table>
            <div id="reset-error" class="form-message-error"></div>
            <div id="reset-success" class="form-message-success"></div>
            <input type="submit" value="Enviar" class="btn-submit">
        </form>
        <p class="register-link"><a href="login.html">Voltar ao login</a></p>
    </div>
</div>
<footer>
    <div class="footer-logo"><img src="../img/logo.png" alt="Logo"></div>
    <div class="footer-links">
        <a href="../about.html">Sobre Nós</a>
        <a href="../pet/list.html">Pets</a>
        <a href="../contact.html">Contato</a>
    </div>
    <div class="footer-copy">© 2026</div>
</footer>
<script src="../javascript/constantes.js"></script>
<script src="../javascript/accounts/common.js"></script>
<script src="../javascript/accounts/password_reset.js"></script>
</body>
</html>
